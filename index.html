<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Créditos V2 - Oficial</title>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; margin: 0; }
        h1 { color: #38bdf8; text-align: center; font-size: 1.5rem; text-transform: uppercase; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; max-width: 900px; margin-left: auto; margin-right: auto; }
        .resumo-lucro { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .box-lucro { background: #0ea5e9; padding: 15px; border-radius: 10px; text-align: center; min-width: 150px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #0369a1; }
        .btn-atualizar { background: #eab308 !important; color: #0f172a !important; }
        .busca { margin-bottom: 15px; border-color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #334155; color: #38bdf8; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        .lucro-txt { color: #4ade80; font-weight: bold; }
        .botoes-linha { display: flex; gap: 6px; margin-top: 5px; }
        .btn-del { background: #ef4444; padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 4px; border: none; color: white; }
        .btn-edit { background: #3b82f6; padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 4px; border: none; color: white; }
    </style>
</head>
<body>

    <h1>💳 Central de Créditos V2</h1>

    <div class="resumo-lucro">
        <div class="box-lucro">
            <p style="font-size: 10px; margin: 0;">LUCRO TOTAL ACUMULADO</p>
            <h2 id="lucro-geral">R$ 0,00</h2>
        </div>
    </div>

    <div class="card">
        <h2 id="titulo-form">Novo Registro</h2>
        <input type="text" id="revendedor" placeholder="Nome do Revendedor">
        <input type="text" id="servidor" placeholder="Nome do Servidor">
        <select id="quantidade">
            <option value="10">10 Créditos</option>
            <option value="50">50 Créditos</option>
            <option value="100">100 Créditos</option>
            <option value="500">500 Créditos</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="master" placeholder="Valor Master">
            <input type="number" id="revenda" placeholder="Valor Venda">
        </div>
        <button id="btnSalvar">SALVAR NO FIREBASE</button>
    </div>

    <div class="card">
        <h2>Histórico de Vendas</h2>
        <input type="text" id="inputBusca" class="busca" placeholder="🔍 Pesquisar revendedor...">
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Revendedor / Ações</th>
                        <th>Servidor</th>
                        <th>Qtd</th>
                        <th>Master</th>
                        <th>Venda</th>
                        <th>Lucro</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsqUeXLDpUhxvHxXOC19iRoQhPuYOGpFw",
            authDomain: "amigosaru-6a228.firebaseapp.com",
            projectId: "amigosaru-6a228",
            storageBucket: "amigosaru-6a228.firebasestorage.app",
            messagingSenderId: "1024825583351",
            appId: "1:1024825583351:web:0e37cbbde2e279136c55f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ref = collection(db, "creditos_revenda");

        let idEdicao = null;

        // Salvar ou Editar
        document.getElementById("btnSalvar").onclick = async () => {
            const r = document.getElementById("revendedor").value;
            const s = document.getElementById("servidor").value;
            const m = Number(document.getElementById("master").value);
            const v = Number(document.getElementById("revenda").value);
            
            if(!r || !m || !v) return alert("Por favor, preencha o Nome, Master e Venda!");

            try {
                if (idEdicao) {
                    await updateDoc(doc(db, "creditos_revenda", idEdicao), {
                        revendedor: r,
                        servidor: s || "Não informado",
                        quantidade: document.getElementById("quantidade").value,
                        master: m,
                        revenda: v,
                        lucro: v - m
                    });
                    alert("Atualizado!");
                    idEdicao = null;
                    document.getElementById("titulo-form").innerText = "Novo Registro";
                    document.getElementById("btnSalvar").innerText = "SALVAR NO FIREBASE";
                    document.getElementById("btnSalvar").classList.remove("btn-atualizar");
                } else {
                    await addDoc(ref, {
                        revendedor: r,
                        servidor: s || "Não informado",
                        quantidade: document.getElementById("quantidade").value,
                        master: m,
                        revenda: v,
                        lucro: v - m,
                        data: new Date().getTime()
                    });
                    alert("Salvo!");
                }
                document.getElementById("revendedor").value = "";
                document.getElementById("servidor").value = "";
                document.getElementById("master").value = "";
                document.getElementById("revenda").value = "";
            } catch (err) {
                alert("Erro ao processar.");
            }
        };

        // Atualização em Tempo Real
        onSnapshot(query(ref), (snap) => {
            const corpo = document.getElementById("tabela-corpo");
            corpo.innerHTML = "";
            let lucroTotal = 0;

            snap.forEach((d) => {
                const i = d.data();
                lucroTotal += (i.lucro || 0);
                
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>
                        <strong>${i.revendedor || 'Sem Nome'}</strong>
                        <div class="botoes-linha">
                            <button class="btn-edit" data-id="${d.id}" data-revendedor="${i.revendedor || ''}" data-servidor="${i.servidor || ''}" data-quantidade="${i.quantidade || '10'}" data-master="${i.master || 0}" data-revenda="${i.revenda || 0}">Editar</button>
                            <button class="btn-del" data-id="${d.id}">Excluir</button>
                        </div>
                    </td>
                    <td>${i.servidor || 'Sem Servidor'}</td>
                    <td>${i.quantidade || 0}</td>
                    <td>R$ ${(i.master || 0).toFixed(2)}</td>
                    <td>R$ ${(i.revenda || 0).toFixed(2)}</td>
                    <td class="lucro-txt">R$ ${(i.lucro || 0).toFixed(2)}</td>
                `;
                corpo.appendChild(tr);
            });
            document.getElementById("lucro-geral").innerText = "R$ " + lucroTotal.toFixed(2);

            // Clique do botão Excluir
            document.querySelectorAll('.btn-del').forEach(btn => {
                btn.onclick = async (e) => {
                    if(confirm("Excluir este registro?")) {
                        await deleteDoc(doc(db, "creditos_revenda", e.target.getAttribute('data-id')));
                    }
                };
            });

            // Clique do botão Editar
            document.querySelectorAll('.btn-edit').forEach(btn => {
                btn.onclick = (e) => {
                    idEdicao = e.target.getAttribute('data-id');
                    document.getElementById("revendedor").value = e.target.getAttribute('data-revendedor');
                    document.getElementById("servidor").value = e.target.getAttribute('data-servidor');
                    document.getElementById("quantidade").value = e.target.getAttribute('data-quantidade');
                    document.getElementById("master").value = e.target.getAttribute('data-master');
                    document.getElementById("revenda").value = e.target.getAttribute('data-revenda');

                    document.getElementById("titulo-form").innerText = "✍️ Editando Registro";
                    document.getElementById("btnSalvar").innerText = "ATUALIZAR REGISTRO 🔄";
                    document.getElementById("btnSalvar").classList.add("btn-atualizar");
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
            });
        });

        // Filtro de Busca
        document.getElementById("inputBusca").onkeyup = () => {
            let input = document.getElementById("inputBusca").value.toUpperCase();
            let tr = document.getElementById("tabela-corpo").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    tr[i].style.display = td.innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        };
    </script>
</body>
</html>
