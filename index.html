<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Créditos V2 - Oficial</title>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; margin: 0; }
        h1 { color: #38bdf8; text-align: center; font-size: 1.5rem; text-transform: uppercase; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; max-width: 900px; margin-left: auto; margin-right: auto; }
        .resumo-lucro { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .box-lucro { background: #0ea5e9; padding: 15px; border-radius: 10px; text-align: center; min-width: 150px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #0369a1; }
        .busca { margin-bottom: 15px; border-color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #334155; color: #38bdf8; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        .lucro-txt { color: #4ade80; font-weight: bold; }
        .btn-del { background: #ef4444; padding: 6px 10px; font-size: 11px; cursor: pointer; border-radius: 4px; border: none; color: white; }
    </style>
</head>
<body>

    <h1>💳 Central de Créditos V2</h1>

    <div class="resumo-lucro">
        <div class="box-lucro">
            <p style="font-size: 10px; margin: 0;">LUCRO TOTAL ACUMULADO</p>
            <h2 id="lucro-geral">R$ 0,00</h2>
        </div>
    </div>

    <div class="card">
        <h2>Novo Registro</h2>
        <input type="text" id="revendedor" placeholder="Nome do Revendedor">
        <input type="text" id="servidor" placeholder="Servidor">
        <select id="quantidade">
            <option value="10">10 Créditos</option>
            <option value="50">50 Créditos</option>
            <option value="100">100 Créditos</option>
            <option value="500">500 Créditos</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="master" placeholder="Valor Master">
            <input type="number" id="revenda" placeholder="Valor Venda">
        </div>
        <button id="btnSalvar">SALVAR NO FIREBASE</button>
    </div>

    <div class="card">
        <h2>Histórico de Vendas</h2>
        <input type="text" id="inputBusca" class="busca" placeholder="🔍 Pesquisar revendedor...">
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Revendedor</th>
                        <th>Qtd</th>
                        <th>Master</th>
                        <th>Venda</th>
                        <th>Lucro</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Sua configuração oficial
        const firebaseConfig = {
            apiKey: "AIzaSyCsqUeXLDpUhxvHxXOC19iRoQhPuYOGpFw",
            authDomain: "amigosaru-6a228.firebaseapp.com",
            projectId: "amigosaru-6a228",
            storageBucket: "amigosaru-6a228.firebasestorage.app",
            messagingSenderId: "1024825583351",
            appId: "1:1024825583351:web:0e37cbbde2e279136c55f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ref = collection(db, "creditos_revenda");

        // Função para Salvar
        document.getElementById("btnSalvar").onclick = async () => {
            const r = document.getElementById("revendedor").value;
            const m = Number(document.getElementById("master").value);
            const v = Number(document.getElementById("revenda").value);
            
            if(!r || !m || !v) return alert("Por favor, preencha o Nome, Master e Venda!");

            try {
                await addDoc(ref, {
                    revendedor: r,
                    servidor: document.getElementById("servidor").value,
                    quantidade: document.getElementById("quantidade").value,
                    master: m,
                    revenda: v,
                    lucro: v - m,
                    data: new Date().getTime()
                });
                document.getElementById("revendedor").value = "";
                document.getElementById("master").value = "";
                document.getElementById("revenda").value = "";
                alert("Salvo com sucesso!");
            } catch (err) {
                console.error("Erro ao salvar:", err);
                alert("Erro de conexão. Verifique as regras do seu Firestore!");
            }
        };

        // Função para Ler em Tempo Real (Persistência)
        const q = query(ref); 
        onSnapshot(q, (snap) => {
            const corpo = document.getElementById("tabela-corpo");
            corpo.innerHTML = "";
            let lucroTotal = 0;

            snap.forEach((d) => {
                const i = d.data();
                lucroTotal += (i.lucro || 0);
                
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${i.revendedor}</td>
                    <td>${i.quantidade}</td>
                    <td>R$ ${(i.master || 0).toFixed(2)}</td>
                    <td>R$ ${(i.revenda || 0).toFixed(2)}</td>
                    <td class="lucro-txt">R$ ${(i.lucro || 0).toFixed(2)}</td>
                    <td><button class="btn-del" data-id="${d.id}">Excluir</button></td>
                `;
                corpo.appendChild(tr);
            });
            document.getElementById("lucro-geral").innerText = "R$ " + lucroTotal.toFixed(2);

            document.querySelectorAll('.btn-del').forEach(btn => {
                btn.onclick = async (e) => {
                    const id = e.target.getAttribute('data-id');
                    if(confirm("Deseja realmente excluir este registro?")) {
                        await deleteDoc(doc(db, "creditos_revenda", id));
                    }
                };
            });
        });

        // Filtro de Busca
        document.getElementById("inputBusca").onkeyup = () => {
            let input = document.getElementById("inputBusca").value.toUpperCase();
            let tr = document.getElementById("tabela-corpo").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    tr[i].style.display = td.innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        };
    </script>
</body>
</html>
