<!DOCTYPE html>

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #334155; color: #38bdf8; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        .lucro-txt { color: #4ade80; font-weight: bold; }
        .acoes-flex { display: flex; gap: 8px; }
        .btn-del { background: #ef4444; padding: 8px 12px; font-size: 12px; cursor: pointer; border-radius: 4px; border: none; color: white; font-weight: bold; }
        .btn-del:hover { background: #dc2626; }
        .btn-edit { background: #3b82f6; padding: 8px 12px; font-size: 12px; cursor: pointer; border-radius: 4px; border: none; color: white; font-weight: bold; }
        .btn-edit:hover { background: #2563eb; }
    </style>
</head>
